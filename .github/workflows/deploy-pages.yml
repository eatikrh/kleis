name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build mdBook
        run: |
          cd docs/manual
          mdbook build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp .nojekyll _site/
          cp index.html _site/
          cp sitemap.xml _site/
          cp -r static _site/static
          mkdir -p _site/docs/manual
          cp -r docs/manual/book _site/docs/manual/book
          mkdir -p _site/docs/papers
          cp -r docs/papers/* _site/docs/papers/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
